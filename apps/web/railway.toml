[build]
builder = "railpack"
buildCommand = "pnpm turbo build --filter=@mt/web..."
watchPatterns = [
  "/apps/web/**",
  "/packages/api/**",
  "/packages/auth/**",
  "/packages/jobs/**",
  "/package.json",
  "/pnpm-lock.yaml",
  "/turbo.json",
]

[deploy]
preDeployCommand = "pnpm --filter @mt/api exec prisma migrate deploy"
startCommand = "cp -r apps/web/public apps/web/.next/standalone/apps/web/public && cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static && node apps/web/.next/standalone/apps/web/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
