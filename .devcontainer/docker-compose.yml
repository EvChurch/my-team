services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TZ: ${TZ:-UTC}
        GIT_DELTA_VERSION: "0.18.2"
        ZSH_IN_DOCKER_VERSION: "1.2.1"
    volumes:
      - ..:/workspace:cached
      - claude-code-bashhistory:/commandhistory
      - claude-code-config:/home/vscode/.claude
      - claude-code-gh:/home/vscode/.config/gh
      - devcontainer-ssh:/home/vscode/.ssh
      - codex-config:/home/vscode/.codex
      - ${HOME}/.gitconfig:/home/vscode/.gitconfig:ro
      - .:/workspace/.devcontainer:ro
    ports:
      - "127.0.0.1:2297:22"
    environment:
      CODEX_HOME: /home/vscode/.codex
    command: >
      bash -lc "sudo ssh-keygen -A &&
      sudo install -d -m 0755 /run/sshd &&
      sudo install -d -o vscode -g vscode -m 0700 /home/vscode/.ssh &&
      sync-github-authorized-keys &&
      sudo /usr/sbin/sshd &&
      sleep infinity"
    stdin_open: true
    tty: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myteam
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  claude-code-bashhistory:
  claude-code-config:
  claude-code-gh:
  devcontainer-ssh:
  codex-config:
  pgdata:
